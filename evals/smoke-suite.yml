suite: builder-smoke-benchmarks-20260404
defaults:
  question_strategy: skip
  timeouts:
    project_ready_seconds: 90
    plan_seconds: 600
    idle_seconds: 600
    preview_seconds: 1200

cases:
  # Multi-screen CRUD benchmark: dashboards, forms, streak state, empty states.
  - id: habit_tracker_build
    project_name: Smoke Habit Bench 20260404A
    prompt: >
      Build an iOS habit tracker with a polished home dashboard, a daily habits list,
      streak indicators, completion toggles, and a simple add-edit habit flow.
      Keep the scope tight enough to demo immediately, but make the navigation,
      empty states, and visual hierarchy feel production-ready.

  # Financial dashboard benchmark: summary cards, categories, lists, scoped build follow-up.
  - id: budget_dashboard_build
    project_name: Smoke Budget Bench 20260404B
    prompt: >
      Build a personal budget snapshot app with a monthly overview, category spending cards,
      a recent transactions feed, and lightweight trend context.
      Make it easy to understand at a glance and polished enough that it could pass as a real MVP.
    steps:
      - wait_for_plan
      - type: send_message
        message: >
          Use the plan, but keep v1 tightly scoped to the monthly summary, category breakdown,
          recent transactions, and one strong dashboard screen. Start building now.
      - wait_for_preview

  # ask_user benchmark: content browsing, search/filter, detail screens, local sample data.
  - id: recipe_library_answers_build
    project_name: Smoke Recipe Bench 20260404C
    prompt: >
      Build a recipe organizer app with saved recipes, category browsing, search,
      short recipe cards, and a detailed recipe screen with ingredients and steps.
      The first version should feel visually polished and useful even with local sample data only.
    question_strategy: answers_then_skip
    question_answers:
      - >
        Keep the first version focused on saved recipes, category filters, search,
        and a strong recipe detail screen.
      - >
        Use polished local sample data instead of any network dependency,
        and optimize for fast browsing rather than social features.

  # Design-sensitivity benchmark: onboarding context should materially influence the build.
  - id: mindful_journal_onboarding_build
    project_name: Smoke Journal Bench 20260404D
    prompt: >
      Build a daily reflection journal app with mood check-ins, short text entries,
      a recent entries view, and a calm home screen that feels personal rather than social.
    onboarding:
      design_style: soft
      target_audience:
        - professionals
      additional_details: >
        Keep the tone calm and low-friction. Prioritize warm visuals, simple empty states,
        and an experience that feels private, focused, and emotionally safe.

  # Planning benchmark: a more complex product should still produce a strong plan before build.
  - id: travel_planner_plan_only
    project_name: Smoke Travel Bench 20260404E
    prompt: >
      Create a trip planner app with an overview dashboard, day-by-day itinerary,
      reservation cards, packing checklist, and trip detail screens.
      Produce a concrete implementation plan for a polished first version, but stop before building.
    steps:
      - wait_for_plan
      - stop
