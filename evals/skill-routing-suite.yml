suite: builder-skill-routing-benchmarks-20260405
defaults:
  question_strategy: skip
  timeouts:
    project_ready_seconds: 90
    plan_seconds: 600
    idle_seconds: 600
    preview_seconds: 1200

cases:
  - id: image_editor_build
    project_name: Skill Routing Image Bench 20260405A
    expected_skills:
      - image-editing
    prompt: >
      Build an iOS photo editor that lets the user import a picture, crop it,
      rotate it, apply a few polished filter and exposure controls, add text overlays,
      and export the final edited image. Keep the first version tight but production-feeling.

  - id: product_viewer_3d_build
    project_name: Skill Routing 3D Bench 20260405B
    expected_skills:
      - 3d-effects
    prompt: >
      Build an iOS furniture viewer that showcases a USDZ chair model with a strong hero viewer,
      smooth rotation controls, material or color variants, and an AR preview handoff.
      Make the model browsing feel like a real product experience rather than a toy demo.

  - id: pushup_counter_build
    project_name: Skill Routing Vision Bench 20260405C
    expected_skills:
      - ml-and-vision
    prompt: >
      Build an iOS workout coach that uses the camera to count pushups in real time,
      tracks the user's body pose, shows rep feedback on screen, and keeps the first version on-device.
      Prioritize a believable architecture for pose analysis and rep counting.

  - id: tiktok_algorithm_plan_only
    project_name: Skill Routing Algo Bench 20260405D
    expected_skills:
      - algorithms
    prompt: >
      Plan a short-form recipe video app with a TikTok-style for-you feed that ranks clips per user,
      uses watch time and skips as feedback, handles cold start, and keeps the ranking system explainable.
      Produce a concrete architecture plan, but stop before building.
    steps:
      - wait_for_plan
      - stop

  - id: creator_coach_multi_skill_plan
    project_name: Skill Routing Combo Bench 20260405E
    expected_skills:
      - algorithms
      - image-editing
      - ml-and-vision
    prompt: >
      Plan a creator fitness app where users upload workout videos, the app counts pushup reps from video,
      generates an edited cover image for each clip, and ranks clips in a personalized feed.
      Produce the plan only and make sure the architecture is realistic for those three systems.
    steps:
      - wait_for_plan
      - stop
