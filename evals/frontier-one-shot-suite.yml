suite: builder-frontier-one-shot-benchmarks-20260408
defaults:
  question_strategy: fail
  timeouts:
    project_ready_seconds: 90
    plan_seconds: 900
    idle_seconds: 900
    preview_seconds: 1800

cases:
  # Dense founder workflow: dashboard judgment, timelines, notes, and next actions.
  - id: founder_relationship_manager_build
    project_name: Frontier Founder Bench 20260408A
    prompt: |
      Founder relationship manager

      Build an iOS app for keeping track of warm intros, investor conversations, customer conversations, and follow-ups. The first version should feel like a real founder tool: a high-signal daily dashboard, a searchable contact list with relationship status, rich contact detail timelines, quick notes after meetings, and clear next actions. Use polished local sample data, keep everything local-first, and make sensible product decisions without asking follow-up questions.

      ---
      User preferences from onboarding:
      Color palette: accent: #0A84FF, background: #F6F4EF, primary: #1B1B18, secondary: #6B6B63, surface: #FFFFFF
      Target audience: Startup founders & operators
      Additional details: Design direction: Premium, calm, information-dense. Feels like Linear meets Superhuman on iPhone. Typography: SF Pro Display + SF Pro Text. Corner radius: Medium (12pt). Spacing: Tight but breathable. Shadows: Very subtle. Prioritize scanability, relationship health, and the feeling that every screen helps the user decide who to contact next.

  # Derived planning benchmark: prioritization logic, progress visualization, and scope discipline.
  - id: study_sprint_planner_build
    project_name: Frontier Study Bench 20260408B
    prompt: |
      Study sprint planner

      Build an iOS app for students juggling multiple exams and assignments. It should turn a messy workload into a clean daily plan: a dashboard with urgency, hours remaining, and today's focus list; subject pages with topic progress; lightweight session tracking; and a simple auto-prioritized agenda that feels intelligent but believable. Use local sample data only, keep the product sharply scoped, and do not ask follow-up questions.

      ---
      User preferences from onboarding:
      Color palette: accent: #FF6B35, background: #FFF9F2, primary: #1E1E24, secondary: #6C6F7D, surface: #FFFFFF
      Target audience: High school seniors & college students
      Additional details: Design direction: Sharp, optimistic, academically serious. Inspired by the clarity of Notion Calendar and the momentum of modern study apps, but less generic. Typography: SF Pro. Corner radius: Medium (12pt). Spacing: Balanced. Shadows: Subtle. Make prioritization, countdowns, and progress snapshots feel motivating at a glance.

  # Creative-tool benchmark: image flow, sequencing, lightweight editing, and emotional visual design.
  - id: travel_diary_editor_build
    project_name: Frontier Diary Bench 20260408C
    prompt: |
      Travel diary editor

      Build an iOS app for turning a trip into a small visual journal. Users should be able to browse trip days, open a day, add or reorder photo moments, write short captions, apply lightweight edits like crop presets and warmth or grain controls, and export a polished story card. Keep v1 focused and believable with local sample content only, and make decisions without follow-up questions.

      ---
      User preferences from onboarding:
      Color palette: accent: #C96C50, background: #F8F2EA, primary: #2A211C, secondary: #7A6A5E, surface: #FFFDF9
      Target audience: Creative travelers
      Additional details: Design direction: Editorial, tactile, warm. Feels like a boutique travel magazine mixed with a disposable-camera app, not a utility dashboard. Typography: New York for headlines, SF Pro Text for UI. Corner radius: Soft (16pt). Spacing: Relaxed. Shadows: Soft paper-like depth. The app should feel emotional, memory-oriented, and visually composed.

  # Specialized-skill benchmark: 3D product browsing, variants, and AR handoff.
  - id: furniture_showroom_3d_build
    project_name: Frontier Furniture Bench 20260408D
    prompt: |
      Furniture showroom with AR preview

      Build an iOS app for browsing a tiny designer furniture catalog with a hero 3D product viewer, material variants, product storytelling, a saved shortlist, and an AR room preview handoff. Keep v1 intentionally narrow: one standout chair model plus a few color or material options is enough if the experience feels premium and real. Avoid backend or auth, use sensible local data and assets, and do not ask follow-up questions.

      ---
      User preferences from onboarding:
      Color palette: accent: #B88A44, background: #F5F1EA, primary: #181614, secondary: #6D655D, surface: #FFFFFF
      Target audience: Interior design enthusiasts
      Additional details: Design direction: Cinematic luxury retail. Large imagery, spacious composition, restrained chrome, and excellent typography hierarchy. Typography: Canela-style serif for hero moments, SF Pro for interface text. Corner radius: Medium (14pt). Spacing: Spacious. Shadows: Soft and elegant. Make it feel closer to a premium catalog than a gadget demo.

  # Specialized-skill benchmark: believable on-device vision, real-time session UX, and coaching feedback.
  - id: form_coach_vision_build
    project_name: Frontier Form Coach Bench 20260408E
    prompt: |
      Form coach for bodyweight training

      Build an iOS app for bodyweight training that uses the camera to count squats and pushups, shows rep count and movement phase live, and gives simple on-screen coaching cues plus a clean workout summary. Keep the first version believable and on-device, with a strong session flow, lightweight history, and a UI that feels trustworthy rather than gimmicky. Make reasonable decisions without follow-up questions.

      ---
      User preferences from onboarding:
      Color palette: accent: #32D74B, background: #0D1117, primary: #F5F7FA, secondary: #98A2B3, surface: #151B23
      Target audience: Fitness enthusiasts
      Additional details: Design direction: Performance lab, not bodybuilding app. Crisp overlays, legible live metrics, and a serious coaching tone. Typography: SF Pro. Corner radius: Medium (12pt). Spacing: Tight in live mode, more open in summary screens. Shadows: Minimal. The camera experience should feel technically credible and calm under motion.

  # Pro-tool benchmark: dense operational interface with live state, cues, and countdown emphasis.
  - id: live_show_rundown_build
    project_name: Frontier Rundown Bench 20260408F
    prompt: |
      Live show run-of-show

      Build an iOS app for producers running live events and shoots. It needs a minute-by-minute show timeline, segment cards with cues and owners, a contact sheet, quick change logging, and a live mode screen that makes the current block, next cue, and countdown impossible to miss. Use polished local sample data, keep it operational and fast to scan, and do not ask follow-up questions.

      ---
      User preferences from onboarding:
      Color palette: accent: #FF453A, background: #F7F7F5, primary: #111111, secondary: #666666, surface: #FFFFFF
      Target audience: Production teams
      Additional details: Design direction: Broadcast control room translated into a modern mobile tool. High contrast, strong status color, compact chips, and ruthless information hierarchy. Typography: SF Pro Condensed for timing-heavy moments, SF Pro Text elsewhere. Corner radius: Small (8pt). Spacing: Compact. Shadows: Almost none. Every screen should help the user avoid missing a cue.
