name: Release Stable DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver to publish, for example 1.1.0
        required: true
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  release-stable:
    uses: ./.github/workflows/release-channel.yml
    with:
      channel: stable
      requested_version: ${{ github.event.inputs.version || '' }}
      requested_build: ""
      github_ref_type: ${{ github.ref_type }}
      github_ref_name: ${{ github.ref_name }}
    secrets: inherit
