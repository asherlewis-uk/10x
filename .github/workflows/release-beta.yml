name: Release Beta DMG

on:
  workflow_dispatch:
    inputs:
      version:
        description: Semver to publish, for example 1.1.0
        required: true
      build:
        description: Beta build number between 1 and 8999
        required: true
  push:
    tags:
      - "beta/v*"

permissions:
  contents: read

jobs:
  release-beta:
    uses: ./.github/workflows/release-channel.yml
    with:
      channel: beta
      requested_version: ${{ github.event.inputs.version || '' }}
      requested_build: ${{ github.event.inputs.build || '' }}
      github_ref_type: ${{ github.ref_type }}
      github_ref_name: ${{ github.ref_name }}
    secrets: inherit
