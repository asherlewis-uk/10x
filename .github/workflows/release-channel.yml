name: Release Channel

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      requested_version:
        required: false
        type: string
      requested_build:
        required: false
        type: string
      github_ref_type:
        required: false
        type: string
      github_ref_name:
        required: false
        type: string

permissions:
  contents: read

jobs:
  release:
    runs-on: macos-15
    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_DEVELOPER_ID_APP_P12_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_APP_P12_BASE64 }}
      APPLE_DEVELOPER_ID_APP_P12_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_APP_P12_PASSWORD }}
      APPLE_DEVELOPER_ID_PROFILE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_PROFILE_BASE64 }}
      APPLE_NOTARY_API_KEY_P8: ${{ secrets.APPLE_NOTARY_API_KEY_P8 }}
      APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
      APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
      NOTARY_KEYCHAIN_PROFILE: ${{ secrets.NOTARY_KEYCHAIN_PROFILE }}
      SPARKLE_PRIVATE_KEY_BASE64: ${{ secrets.SPARKLE_PRIVATE_KEY_BASE64 }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
    steps:
      - name: Check required secrets
        shell: bash
        run: |
          set -euo pipefail
          required=(
            APPLE_TEAM_ID
            APPLE_DEVELOPER_ID_APP_P12_BASE64
            APPLE_DEVELOPER_ID_APP_P12_PASSWORD
            APPLE_NOTARY_API_KEY_P8
            APPLE_NOTARY_KEY_ID
            APPLE_NOTARY_ISSUER_ID
            NOTARY_KEYCHAIN_PROFILE
            SPARKLE_PRIVATE_KEY_BASE64
            VERCEL_TOKEN
            VERCEL_PROJECT_ID
            VERCEL_ORG_ID
          )
          missing=()
          for key in "${required[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              missing+=("$key")
            fi
          done
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required release secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve version and build
        id: release_vars
        shell: bash
        env:
          CHANNEL: ${{ inputs.channel }}
          REQUESTED_VERSION: ${{ inputs.requested_version }}
          REQUESTED_BUILD: ${{ inputs.requested_build }}
          GITHUB_REF_TYPE_INPUT: ${{ inputs.github_ref_type }}
          GITHUB_REF_NAME_INPUT: ${{ inputs.github_ref_name }}
        run: |
          set -euo pipefail

          channel="$CHANNEL"
          requested_version="${REQUESTED_VERSION:-}"
          requested_build="${REQUESTED_BUILD:-}"
          ref_type="${GITHUB_REF_TYPE_INPUT:-}"
          ref_name="${GITHUB_REF_NAME_INPUT:-}"

          case "$channel" in
            beta|stable) ;;
            *)
              echo "Unsupported release channel: $channel" >&2
              exit 1
              ;;
          esac

          if [[ "$ref_type" == "tag" ]]; then
            if [[ "$channel" == "beta" ]]; then
              tag="${ref_name#beta/v}"
              if [[ "$tag" =~ ^([0-9]+(\.[0-9]+){2})-beta\.([0-9]+)$ ]]; then
                version="${BASH_REMATCH[1]}"
                build="${BASH_REMATCH[3]}"
              else
                echo "Expected tag format beta/v<semver>-beta.<build>, got $ref_name" >&2
                exit 1
              fi
            else
              tag="${ref_name#v}"
              if [[ "$tag" =~ ^[0-9]+(\.[0-9]+){2}$ ]]; then
                version="$tag"
                build="9000"
              else
                echo "Expected tag format v<semver>, got $ref_name" >&2
                exit 1
              fi
            fi
          else
            version="$requested_version"
            if [[ "$channel" == "stable" ]]; then
              build="9000"
            else
              build="$requested_build"
            fi
          fi

          [[ "$version" =~ ^[0-9]+(\.[0-9]+){2}$ ]] || {
            echo "Expected semver version, got '$version'" >&2
            exit 1
          }

          if [[ "$channel" == "stable" ]]; then
            [[ "$build" == "9000" ]] || {
              echo "Stable releases must use build 9000, got '$build'" >&2
              exit 1
            }
            tag="v$version"
            artifact_filename="10x-${version}.dmg"
            release_slug="$version"
          else
            [[ "$build" =~ ^[0-9]+$ ]] || {
              echo "Beta build must be numeric, got '$build'" >&2
              exit 1
            }
            if (( build < 1 || build > 8999 )); then
              echo "Beta build must be between 1 and 8999, got '$build'" >&2
              exit 1
            fi
            tag="beta/v${version}-beta.${build}"
            artifact_filename="10x-${version}-beta.${build}.dmg"
            release_slug="${version}-beta.${build}"
          fi

          echo "channel=$channel" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "build=$build" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "artifact_filename=$artifact_filename" >> "$GITHUB_OUTPUT"
          echo "release_slug=$release_slug" >> "$GITHUB_OUTPUT"
          echo "metadata_base_url=https://downloads.10x.app" >> "$GITHUB_OUTPUT"

      - name: Guard monotonic numbering
        shell: bash
        env:
          CHANNEL: ${{ steps.release_vars.outputs.channel }}
          REQUESTED_VERSION: ${{ steps.release_vars.outputs.version }}
          REQUESTED_BUILD: ${{ steps.release_vars.outputs.build }}
          METADATA_BASE_URL: ${{ steps.release_vars.outputs.metadata_base_url }}
        run: |
          set -euo pipefail

          latest_json="$(curl -fsSL "$METADATA_BASE_URL/$CHANNEL/latest.json" || true)"
          if [[ -z "$latest_json" ]]; then
            echo "No existing $CHANNEL metadata found; skipping monotonic numbering check."
            exit 0
          fi

          CHANNEL="$CHANNEL" \
          REQUESTED_VERSION="$REQUESTED_VERSION" \
          REQUESTED_BUILD="$REQUESTED_BUILD" \
          LATEST_JSON="$latest_json" \
          node <<'NODE'
          const channel = process.env.CHANNEL;
          const requestedVersion = process.env.REQUESTED_VERSION;
          const requestedBuild = Number(process.env.REQUESTED_BUILD);
          const latest = JSON.parse(process.env.LATEST_JSON ?? "{}");

          const parseSemver = (value) => {
            const parts = String(value ?? "").split(".").map(Number);
            if (parts.length !== 3 || parts.some((part) => !Number.isInteger(part) || part < 0)) {
              throw new Error(`Invalid semver: ${value}`);
            }
            return parts;
          };

          const compareSemver = (left, right) => {
            for (let index = 0; index < 3; index += 1) {
              if (left[index] !== right[index]) {
                return left[index] - right[index];
              }
            }
            return 0;
          };

          const requested = parseSemver(requestedVersion);
          const current = parseSemver(latest.version);
          const currentBuild = Number(latest.build);

          if (!Number.isInteger(requestedBuild) || requestedBuild < 0) {
            throw new Error(`Invalid build number: ${process.env.REQUESTED_BUILD}`);
          }
          if (!Number.isInteger(currentBuild) || currentBuild < 0) {
            throw new Error(`Invalid live build number: ${latest.build}`);
          }

          const semverComparison = compareSemver(requested, current);
          if (channel === "stable") {
            if (semverComparison <= 0) {
              throw new Error(
                `Refusing to publish stable ${requestedVersion} because live stable metadata is already at ${latest.version} build ${latest.build}.`,
              );
            }
            process.exit(0);
          }

          if (semverComparison < 0) {
            throw new Error(
              `Refusing to publish ${requestedVersion} beta ${requestedBuild} because live beta metadata is already at ${latest.version} beta ${latest.build}.`,
            );
          }
          if (semverComparison === 0 && requestedBuild <= currentBuild) {
            throw new Error(
              `Refusing to publish ${requestedVersion} beta ${requestedBuild} because Sparkle requires a strictly higher build than the live ${latest.version} beta ${latest.build}.`,
            );
          }
          NODE

      - name: Set up signing keychain
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          keychain="$RUNNER_TEMP/release.keychain-db"
          cert_path="$RUNNER_TEMP/developer-id.p12"
          notary_key_path="$RUNNER_TEMP/AuthKey.p8"
          apple_team_id="$(printf '%s' "$APPLE_TEAM_ID" | tr -d '\r\n')"
          apple_notary_key_id="$(printf '%s' "$APPLE_NOTARY_KEY_ID" | tr -d '\r\n')"
          apple_notary_issuer_id="$(printf '%s' "$APPLE_NOTARY_ISSUER_ID" | tr -d '\r\n')"

          echo "$APPLE_DEVELOPER_ID_APP_P12_BASE64" | base64 --decode > "$cert_path"
          printf '%s' "$APPLE_NOTARY_API_KEY_P8" > "$notary_key_path"

          security create-keychain -p "" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "" "$keychain"
          security import "$cert_path" -k "$keychain" -P "$APPLE_DEVELOPER_ID_APP_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          existing_keychains=$(security list-keychains -d user | sed 's/^ *//; s/"//g')
          security list-keychains -d user -s "$keychain" $existing_keychains
          security default-keychain -d user -s "$keychain"
          security set-key-partition-list -S apple-tool:,apple: -s -k "" "$keychain"

          identity=$(security find-identity -v -p codesigning "$keychain" | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [[ -z "$identity" ]]; then
            echo "Developer ID Application identity was not imported correctly." >&2
            exit 1
          fi

          echo "APPLE_TEAM_ID=$apple_team_id" >> "$GITHUB_ENV"
          echo "DEV_ID_APP_CERT_NAME=$identity" >> "$GITHUB_ENV"
          echo "SIGNING_KEYCHAIN=$keychain" >> "$GITHUB_ENV"
          echo "NOTARY_KEYCHAIN=$keychain" >> "$GITHUB_ENV"
          echo "NOTARY_API_KEY_PATH=$notary_key_path" >> "$GITHUB_ENV"
          echo "NOTARY_KEY_ID=$apple_notary_key_id" >> "$GITHUB_ENV"
          echo "NOTARY_ISSUER_ID=$apple_notary_issuer_id" >> "$GITHUB_ENV"

          if [[ -n "${APPLE_DEVELOPER_ID_PROFILE_BASE64:-}" ]]; then
            profile_path="$RUNNER_TEMP/10x-developer-id.provisionprofile"
            profile_plist_path="$RUNNER_TEMP/10x-developer-id-profile.plist"
            xcode_profiles_dir="$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"
            mobile_profiles_dir="$HOME/Library/MobileDevice/Provisioning Profiles"

            echo "$APPLE_DEVELOPER_ID_PROFILE_BASE64" | base64 --decode > "$profile_path"
            security cms -D -i "$profile_path" > "$profile_plist_path"
            profile_name="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$profile_plist_path")"
            profile_uuid="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$profile_plist_path")"

            mkdir -p "$xcode_profiles_dir" "$mobile_profiles_dir"
            cp "$profile_path" "$xcode_profiles_dir/$profile_uuid.provisionprofile"
            cp "$profile_path" "$mobile_profiles_dir/$profile_uuid.provisionprofile"

            echo "DEV_ID_PROFILE_NAME=$profile_name" >> "$GITHUB_ENV"
          fi

      - name: Build, package, notarize, and verify release artifacts
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          version="${{ steps.release_vars.outputs.version }}"
          build="${{ steps.release_vars.outputs.build }}"
          channel="${{ steps.release_vars.outputs.channel }}"

          ./scripts/release/build-release.sh "$version" "$build" "$channel"
          ./scripts/release/create-dmg.sh "$version" "$build" "$channel"
          ./scripts/release/notarize-dmg.sh "$version" "$build" "$channel"
          ./scripts/release/verify-release.sh "$version" "$build" "$channel"

      - name: Publish release site
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          version="${{ steps.release_vars.outputs.version }}"
          build="${{ steps.release_vars.outputs.build }}"
          channel="${{ steps.release_vars.outputs.channel }}"
          site_root="$RUNNER_TEMP/site"

          export DIST_BASE_URL="${{ steps.release_vars.outputs.metadata_base_url }}"
          export SPARKLE_PRIVATE_KEY_BASE64="$SPARKLE_PRIVATE_KEY_BASE64"

          ./scripts/release/publish-release.sh "$version" "$build" "$channel" "$site_root"

      - name: Deploy release site to Vercel
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          ./scripts/release/deploy-vercel.sh "$RUNNER_TEMP/site"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: 10x-${{ steps.release_vars.outputs.channel }}-${{ steps.release_vars.outputs.release_slug }}
          compression-level: 0
          path: |
            ${{ github.workspace }}/build/release/${{ steps.release_vars.outputs.channel }}/${{ steps.release_vars.outputs.release_slug }}/${{ steps.release_vars.outputs.artifact_filename }}
            ${{ github.workspace }}/build/release/${{ steps.release_vars.outputs.channel }}/${{ steps.release_vars.outputs.release_slug }}/build-metadata.json
            ${{ github.workspace }}/build/release/${{ steps.release_vars.outputs.channel }}/${{ steps.release_vars.outputs.release_slug }}/release-notes.html
